<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>병원 앱</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="app">

        <!-- 배경 이미지 -->
        <img id="screen" src="images/main.png" alt="메인화면">

        <!-- 정형외과 -->
        <button class="btn ortho" data-link="hospital.html"></button>

        <!-- 영유아검진 -->
        <button class="btn baby" data-link="hospital.html"></button>

        <!-- 소아과 -->
        <button class="btn child" data-link="hospital.html"></button>

        <!-- 이비인후과 -->
        <button class="btn ent" data-link="hospital.html"></button>

        <!-- 내과 -->
        <button class="btn internal" data-link="hospital.html"></button>

        <!-- 산부인과 -->
        <button class="btn women" data-link="hospital.html"></button>

        <!-- 정신과 -->
        <button class="btn mental" data-link="hospital.html"></button>

        <!-- 피부과 -->
        <button class="btn skin" data-link="hospital.html"></button>

        <!-- 진료기록 -->
        <button class="btn record" data-link="hospital.html"></button>

        <!-- 마이페이지 -->
        <button class="btn mypage" data-link="hospital.html"></button>

    </div>

    <script src="app.js"></script>

</body>

</html>
